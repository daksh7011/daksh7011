name: Update Blog Posts

on:
  schedule:
    - cron: "0 0 * * *" # Runs daily at midnight UTC
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  update-blog:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch latest posts from Ghost Content API
        env:
          GHOST_API_KEY: ${{ secrets.GHOST_CONTENT_API_KEY }}
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            "https://slothiesmooth.dev/ghost/api/content/posts/?key=${GHOST_API_KEY}&limit=5&fields=title,url")

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          echo "HTTP status: $HTTP_CODE"
          echo "Response body: $BODY"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "Error: Ghost API returned HTTP $HTTP_CODE"
            exit 1
          fi

          # Parse titles and URLs using jq and build markdown list
          BLOG_LINES=$(echo "$BODY" | jq -r '.posts[] | "- [\(.title)](\(.url))"')

          echo "Parsed blog lines:"
          echo "$BLOG_LINES"

          # Write the new blog section to a temp file
          {
            echo "<!-- BLOG-START -->"
            echo "$BLOG_LINES"
            echo "<!-- BLOG-END -->"
          } > /tmp/blog_section.txt

          # Replace everything between markers (inclusive) with the new block
          python3 - <<'EOF'
          import re

          with open("README.md", "r") as f:
              content = f.read()

          with open("/tmp/blog_section.txt", "r") as f:
              replacement = f.read().strip()

          new_content = re.sub(
              r"<!-- BLOG-START -->.*?<!-- BLOG-END -->",
              replacement,
              content,
              flags=re.DOTALL,
          )

          with open("README.md", "w") as f:
              f.write(new_content)

          print("README.md updated successfully.")
          EOF

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "chore: update blog posts [skip ci]"
          git push
